[tools]
go = "1.25.10"
node = "24.16.0"
"npm:pnpm" = "11.4.0"
"github:air-verse/air" = "1.65.3"
"github:golangci/golangci-lint" = "2.12.2"
"github:gzuidhof/tygo" = "0.2.20"

# === Build ===

[tasks.build]
description = "Build production API binary"
run = "CGO_ENABLED=0 go build -o ./build/api/api ./cmd/api"

[tasks."build:air"]
description = "Build development API binary (used by air)"
run = "go build -o ./build/api/api-air ./cmd/api"

[tasks."build:docker"]
description = "Build the production Docker image (Go binary + built SPA)"
run = "docker build -t robinandmadeline ."

# === Dev Server ===

[tasks.start]
description = "Start development environment (API + web)"
# db:migrate runs first (the servers depend on it) so local dev applies pending
# migrations without baking auto-migration into the server process. Production
# migrates via the Fly release_command instead.
depends = ["db:migrate", "start:air", "start:web"]

[tasks."start:prep"]
description = "Prepare dev scratch dir and clear any stale API port file"
# The API publishes its chosen port to tmp/api.port and Vite reads it. Clear it
# before launch so start:web never reads a previous session's port (each
# worktree already has its own tmp/api.port), and ensure tmp/ exists so the API
# can write the file.
run = "mkdir -p tmp && rm -f tmp/api.port"

[tasks."start:air"]
description = "Start API with hot reload via Air"
depends = ["db:migrate", "start:prep"]
run = "air"

[tasks."start:web"]
description = "Start Vite dev server (waits for API)"
depends = ["db:migrate", "start:prep"]
# The API binds a free port when its preferred one is taken (so a second
# worktree never collides), so its port is not fixed: wait for it to publish the
# port and be reachable, then start Vite, whose /api proxy reads tmp/api.port
# once at startup.
run = 'until [ -f tmp/api.port ] && nc -z localhost "$(cat tmp/api.port)" 2>/dev/null; do sleep 0.2; done && pnpm start'

[tasks."start:api"]
description = "Start API directly (no hot reload)"
run = "go run ./cmd/api"

# === Database ===
#
# Each git worktree resolves its own database name (pkg/config derives
# robinandmadeline_wt_<slug> for a linked worktree, the canonical
# robinandmadeline for the main checkout), so concurrent worktrees never share a
# database. db:create provisions it before migrating, since a worktree's database
# is not pre-created by docker-compose.

[tasks."db:create"]
description = "Create this worktree's database if it does not exist"
run = "go run ./cmd/migrations createdb"

[tasks."db:migrate"]
description = "Apply pending database migrations"
depends = ["db:create"]
run = "go run ./cmd/migrations migrate"

[tasks."db:rollback"]
description = "Roll back the last applied migration group"
run = "go run ./cmd/migrations rollback"

[tasks."db:status"]
description = "Show applied and pending database migrations"
run = "go run ./cmd/migrations status"

[tasks."db:clone"]
description = "Reset this worktree's database to a copy of the main dev database, then migrate"
# Worktrees start with an empty database; this seeds one from the main checkout's
# data. Refuses to run in the main checkout (target == source) and needs the
# Postgres client tools (pg_dump/psql).
run = '''
set -eu
source_url="postgres://robinandmadeline_admin:password@localhost:5432/robinandmadeline?sslmode=disable"
target_url="$(go run ./cmd/migrations url)"
source_name="$(basename "${source_url%%\?*}")"
target_name="$(basename "${target_url%%\?*}")"
if [ "$target_name" = "$source_name" ]; then
  echo "db:clone only runs inside a linked worktree; here the database is the main '$source_name'." >&2
  exit 1
fi
if ! command -v pg_dump >/dev/null 2>&1 || ! command -v psql >/dev/null 2>&1; then
  echo "db:clone needs the Postgres client tools (pg_dump, psql). On macOS: brew install libpq" >&2
  exit 1
fi
echo "Cloning $source_name -> $target_name ..."
# Dump before dropping the target, so a pg_dump failure leaves the existing
# worktree database untouched rather than emptied. ON_ERROR_STOP makes psql fail
# the task on any restore error instead of exiting 0 on a partial restore.
dump="$(mktemp)"
trap 'rm -f "$dump"' EXIT
pg_dump --no-owner --no-privileges "$source_url" >"$dump"
go run ./cmd/migrations dropdb
go run ./cmd/migrations createdb
psql --quiet -v ON_ERROR_STOP=1 "$target_url" <"$dump" >/dev/null
go run ./cmd/migrations migrate
echo "Done: $target_name now mirrors $source_name and is migrated to this branch."
'''

# === Type Generation ===

[tasks.tygo]
description = "Generate TypeScript types from Go structs"
run = "tygo generate"
sources = ["tygo.yaml", "pkg/models/*.go", "pkg/parties/types.go", "pkg/events/types.go", "pkg/photogroups/types.go", "pkg/rsvps/types.go", "pkg/info/types.go", "pkg/emails/types.go", "pkg/games/types.go", "pkg/dashboard/types.go", "pkg/settings/types.go", "pkg/errcodes/errors.go", "pkg/auth/types.go", "pkg/server/types.go"]
outputs = ["app/types/generated/**/*.ts"]

# === Linting ===

[tasks.lint]
description = "Run Go linting"
# Per-worktree cache so concurrent worktrees don't trip golangci-lint's
# "parallel golangci-lint is running" lock against each other.
env = { GOLANGCI_LINT_CACHE = "{{config_root}}/tmp/golangci-lint-cache" }
run = "golangci-lint run"

[tasks."lint:js"]
description = "Run all JS/TS linting"
# tygo first so lint:types has the generated types on disk (they are gitignored).
depends = ["tygo", "lint:eslint", "lint:prettier", "lint:types"]

[tasks."lint:eslint"]
description = "Run ESLint"
run = "pnpm lint:eslint"

[tasks."lint:prettier"]
description = "Run Prettier check"
run = "pnpm lint:prettier"

[tasks."lint:types"]
description = "Run TypeScript type checking"
depends = ["tygo"]
run = "pnpm lint:types"

# === Testing ===

[tasks.test]
description = "Run Go tests"
env = { CI = "true" }
run = "go test -race ./pkg/... ./cmd/... ./internal/..."

[tasks."test:unit"]
description = "Run JS unit tests"
run = "pnpm test:unit"

[tasks."e2e:chromium"]
description = "Run the e2e tests in Chromium"
# tygo so the Vite dev server has the generated API types on disk. Playwright's
# own globalSetup provisions (creates + migrates) a throwaway per-run database
# on dynamically allocated ports, and globalTeardown drops it, so concurrent e2e
# runs (e.g. from different worktrees) never collide and there is no separate db
# setup step here.
depends = ["tygo"]
run = "pnpm e2e:chromium"

[tasks.e2e]
description = "Run the e2e tests (Chromium)"
depends = ["e2e:chromium"]

# === Check ===

[tasks.check]
description = "Run all validation checks"
depends = ["lint", "lint:js", "test", "test:unit", "e2e:chromium"]

[tasks."check:quiet"]
description = "Run all checks, suppress output on success; dump output and exit non-zero on failure"
# tygo up front so the parallel fan-out below has the generated types on disk.
depends = ["tygo"]
run = '''
echo "Running checks..."
tmpdir=$(mktemp -d)
trap 'rm -rf "$tmpdir"' EXIT
for step in lint lint:js test test:unit e2e:chromium; do
  echo 1 >"$tmpdir/$(echo "$step" | tr ':' '_').rc"
  touch "$tmpdir/$(echo "$step" | tr ':' '_').out"
  ( mise "$step" >"$tmpdir/$(echo "$step" | tr ':' '_').out" 2>&1; echo $? >"$tmpdir/$(echo "$step" | tr ':' '_').rc" ) &
done
wait
failed=0
for step in lint lint:js test test:unit e2e:chromium; do
  key=$(echo "$step" | tr ':' '_')
  rc=$(cat "$tmpdir/$key.rc" 2>/dev/null || echo 1)
  if [ "$rc" -eq 0 ]; then
    printf '  \033[32mPASS\033[0m  %s\n' "$step"
  else
    printf '  \033[31mFAIL\033[0m  %s\n' "$step"
    cat "$tmpdir/$key.out"
    failed=1
  fi
done
if [ "$failed" -eq 1 ]; then
  printf '\n\033[31mcheck:quiet FAILED\033[0m\n'; exit 1
else
  printf '\n\033[32mcheck:quiet PASSED\033[0m\n'
fi
'''

# === Setup ===

[tasks.setup]
description = "Install tools and dependencies, generate TypeScript types"
run = '''
# A fresh git worktree starts without a .env. If the main worktree has one,
# copy it so this worktree inherits the local secrets (Mailgun keys,
# EMAIL_TEST_RECIPIENTS) without setting them up again. Never overwrites an
# existing .env, and is a no-op in the main worktree itself or when it has none.
worktree_root="$(git rev-parse --show-toplevel)"
main_root="$(cd "$(dirname "$(git rev-parse --git-common-dir)")" && pwd)"
if [ "$main_root" != "$worktree_root" ] && [ -f "$main_root/.env" ] && [ ! -f "$worktree_root/.env" ]; then
  cp "$main_root/.env" "$worktree_root/.env"
  echo "Copied .env from the main worktree ($main_root)"
fi

mise install
pnpm install
go mod download
mise tygo
pnpm exec playwright install chromium
'''
