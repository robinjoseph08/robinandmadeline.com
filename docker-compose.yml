services:
  postgres:
    image: postgres:17
    container_name: robinandmadeline-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: robinandmadeline_admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: robinandmadeline
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U robinandmadeline_admin -d robinandmadeline",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
