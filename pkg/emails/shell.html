<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="x-apple-disable-message-reformatting" />
    <title>{{.Subject}}</title>
    <!--
      A small <style> head block is fine (most modern clients honor it), but
      every load-bearing style is ALSO inlined below, because many clients
      strip <style> and ignore external CSS. Keep the two in sync.
    -->
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #f6f5f1;
      }
      a {
        color: #f25477;
      }
      .email-content p {
        margin: 0 0 16px 0;
      }
      .email-content h1,
      .email-content h2,
      .email-content h3 {
        color: #161822;
        font-weight: 600;
        margin: 0 0 12px 0;
      }
      .email-content ul,
      .email-content ol {
        margin: 0 0 16px 0;
        padding-left: 24px;
      }
      .email-content img {
        max-width: 100%;
      }
    </style>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background-color: #f6f5f1;
      color: #161822;
      font-family: Georgia, &quot;Times New Roman&quot;, serif;
    "
  >
    <!--
      Preheader: the inbox and notification preview text, hidden from the
      rendered layout. Clients that build the snippet from the HTML use it, so
      the preview reads as the message's opening line instead of the monogram.
      The zero-width spacer after it keeps a client from appending the visible
      header into the snippet.
    -->
    <div style="display: none; max-height: 0; overflow: hidden">
      {{.Preheader}}
    </div>
    <div style="display: none; max-height: 0; overflow: hidden">
      &zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;
    </div>
    <!-- Full-bleed background wrapper so the cream extends past the card. -->
    <table
      role="presentation"
      width="100%"
      cellpadding="0"
      cellspacing="0"
      border="0"
      style="background-color: #f6f5f1"
    >
      <tr>
        <td align="center" style="padding: 32px 16px">
          <!-- Centered max-width container (the "card"). -->
          <table
            role="presentation"
            width="600"
            cellpadding="0"
            cellspacing="0"
            border="0"
            style="
              width: 600px;
              max-width: 600px;
              background-color: #ffffff;
              border-radius: 16px;
              overflow: hidden;
              box-shadow: 0 1px 3px rgba(22, 24, 34, 0.08);
            "
          >
            <!-- Header: the couple's monogram on the palette pink. -->
            <tr>
              <td
                align="center"
                style="background-color: #ffdcdc; padding: 28px 24px"
              >
                <div
                  style="
                    font-family: Georgia, &quot;Times New Roman&quot;, serif;
                    font-size: 26px;
                    letter-spacing: 2px;
                    color: #161822;
                    font-weight: 600;
                  "
                >
                  R <span style="color: #f25477">&amp;</span> M
                </div>
                <div
                  style="
                    margin-top: 6px;
                    font-family: Arial, Helvetica, sans-serif;
                    font-size: 11px;
                    letter-spacing: 3px;
                    text-transform: uppercase;
                    color: #161822;
                    opacity: 0.7;
                  "
                >
                  Robin &amp; Madeline
                </div>
              </td>
            </tr>

            <!-- Thin palette divider stripe under the header. -->
            <tr>
              <td style="font-size: 0; line-height: 0" height="4">
                <table
                  role="presentation"
                  width="100%"
                  cellpadding="0"
                  cellspacing="0"
                  border="0"
                >
                  <tr>
                    <td
                      width="34%"
                      height="4"
                      style="background-color: #f25477"
                    ></td>
                    <td
                      width="33%"
                      height="4"
                      style="background-color: #adc8ff"
                    ></td>
                    <td
                      width="33%"
                      height="4"
                      style="background-color: #c0ffd4"
                    ></td>
                  </tr>
                </table>
              </td>
            </tr>

            <!-- Content slot: the Markdown body rendered to HTML. -->
            <tr>
              <td
                class="email-content"
                style="
                  padding: 32px 36px;
                  font-family: Georgia, &quot;Times New Roman&quot;, serif;
                  font-size: 16px;
                  line-height: 1.6;
                  color: #161822;
                "
              >
                {{.Content}}
              </td>
            </tr>

            <!-- Footer. -->
            <tr>
              <td
                align="center"
                style="
                  background-color: #f6f5f1;
                  padding: 20px 24px;
                  font-family: Arial, Helvetica, sans-serif;
                  font-size: 12px;
                  line-height: 1.5;
                  color: #161822;
                "
              >
                <span style="opacity: 0.6"
                  >With love, Robin &amp; Madeline</span
                >
                {{if .UnsubscribeURL}}<br />
                <span style="opacity: 0.6"
                  >{{if .RecipientEmail}}This update was sent to
                  {{.RecipientEmail}}. {{end}}<a
                    href="{{.UnsubscribeURL}}"
                    style="color: #161822"
                    >Unsubscribe</a
                  >.</span
                >{{end}}
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
